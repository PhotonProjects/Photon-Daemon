services:
  daemon:
    image: ghcr.io/photon-panel/photon-daemon:latest
    network_mode: host
    privileged: true
    volumes:
      - "/etc/photon/:/etc/photon/"
      - "/var/lib/photon/:/var/lib/photon/"
      - "/var/log/photon/:/var/log/photon/"
      - "/tmp/photon/:/tmp/photon/"
      - "/var/run/docker.sock:/var/run/docker.sock"
    environment:
      PHOTON_UID: 988
      PHOTON_GID: 988
      PHOTON_USERNAME: photon
      TZ: UTC
    restart: always
